<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Streamax Police Solutions & Products</title>
  <style>
    :root {
      --sidebar: 238px;
      --bg: #000;
      --panel: #111;
      --panel-border: #232323;
      --muted: #686868;
      --text: #f2f2f2;
      --active: #111907;
      --green: #9bd126;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "HarmonyOS Sans SC", "HarmonyOS Sans", "HarmonyOS", Arial, Helvetica, sans-serif;
    }

    body {
      overflow: hidden;
    }

    .app {
      display: grid;
      grid-template-columns: var(--sidebar) 1fr;
      height: 100vh;
      background: var(--bg);
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      min-width: 0;
      background: var(--panel);
      border-right: 0;
      box-shadow: 1px 0 0 #000;
      position: relative;
      z-index: 2;
    }

    .brand {
      height: 52px;
      padding: 15px 12px 0;
      border-bottom: 1px solid var(--panel-border);
    }

    .brand img {
      display: block;
      width: 137px;
      height: auto;
    }

    .nav {
      flex: 1;
      overflow-y: auto;
      padding: 18px 0 20px;
    }

    .section-title {
      margin: 0 12px 14px;
      color: #fff;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .section-title + .tab-list {
      margin-bottom: 28px;
    }

    .tab {
      width: 100%;
      padding: 11px 16px 10px;
      border: 0;
      background: transparent;
      color: #858585;
      text-align: left;
      font: inherit;
      cursor: pointer;
    }

    .tab:hover,
    .tab:focus-visible {
      color: #fff;
      outline: 0;
      background: #151515;
    }

    .tab.active {
      color: #fff;
      background: var(--active);
    }

    .tab strong {
      display: block;
      margin-bottom: 3px;
      font-size: 15px;
      line-height: 1.2;
      color: inherit;
    }

    .tab small {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
    }

    .tab.active small {
      color: var(--green);
    }

    .footer {
      padding: 16px 12px 12px;
      border-top: 1px solid var(--panel-border);
      color: #555;
      font-size: 12px;
      line-height: 1.35;
    }

    .viewer {
      min-width: 0;
      height: 100vh;
      overflow: auto;
      background: #000;
      margin-left: -1px;
      border-left: 1px solid #000;
    }

    .panel {
      display: none;
      width: 100%;
      min-height: 100%;
      justify-content: center;
      align-items: flex-start;
    }

    .panel.active {
      display: flex;
    }

    .page-stack,
    .spread-stack {
      width: min(100%, 1191px);
      margin: 0 auto;
      background: #000;
    }

    .edge-mask {
      position: relative;
    }

    .edge-mask::after {
      content: "";
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      width: 3px;
      background: #000;
      pointer-events: none;
    }

    .edge-mask-left {
      position: relative;
    }

    .edge-mask-left::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      width: 3px;
      background: #000;
      pointer-events: none;
      z-index: 1;
    }

    .page-frame {
      display: block;
      position: relative;
      width: 100%;
      margin-top: -1px;
      background: #000;
    }

    .spread-stack {
      width: min(100%, 2382px);
    }

    .pdf-page {
      display: block;
      width: 100%;
      height: auto;
      margin: 0 auto;
      background: #000;
    }

    .pdf-picture {
      display: block;
      width: 100%;
    }

    @media (max-width: 780px) {
      :root {
        --sidebar: 100%;
      }

      body {
        overflow: auto;
        overflow-x: hidden;
      }

      .app {
        display: block;
        width: 100%;
        height: auto;
        min-height: 100vh;
        overflow-x: hidden;
      }

      .sidebar {
        position: sticky;
        top: 0;
        width: 100%;
        max-width: 100vw;
        box-shadow: 0 1px 0 #000;
        z-index: 10;
      }

      .brand {
        height: 42px;
        padding: 10px 12px 0;
      }

      .brand img {
        width: 118px;
      }

      .nav {
        display: flex;
        align-items: stretch;
        gap: 10px;
        width: 100vw;
        max-width: 100vw;
        overflow-x: auto;
        overflow-y: hidden;
        padding: 9px 8px 10px;
        scrollbar-width: thin;
      }

      .section-title {
        flex: 0 0 auto;
        align-self: center;
        margin: 0 0 0 4px;
        font-size: 11px;
        letter-spacing: 2px;
        writing-mode: vertical-rl;
        transform: rotate(180deg);
      }

      .section-title + .tab-list {
        margin-bottom: 0;
      }

      .tab-list {
        display: flex;
        flex: 0 0 auto;
        gap: 4px;
      }

      .tab {
        width: auto;
        min-width: 132px;
        max-width: 178px;
        padding: 8px 10px;
      }

      .tab strong {
        font-size: 12px;
        line-height: 1.18;
      }

      .tab small {
        font-size: 10px;
        line-height: 1.2;
      }

      .footer {
        display: none;
      }

      .viewer {
        width: 100%;
        max-width: 100vw;
        height: auto;
        min-height: calc(100vh - 106px);
        overflow: visible;
        margin-left: 0;
        border-left: 0;
      }

      .panel.active {
        display: block;
        max-width: 100vw;
        overflow: hidden;
      }

      .page-stack,
      .spread-stack {
        width: 100vw;
        min-width: 0;
        max-width: 100vw;
      }

      .pdf-page {
        width: 100vw;
        max-width: 100vw;
      }

      .pdf-picture {
        width: 100vw;
        max-width: 100vw;
      }

      .edge-mask::after,
      .edge-mask-left::before {
        width: 2px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" aria-label="Content navigation">
      <div class="brand">
        <img src="assets/white-logo.png" alt="Streamax">
      </div>

      <nav class="nav">
        <h2 class="section-title">Solutions</h2>
        <div class="tab-list">
          <button class="tab active" type="button" data-target="law">
            <strong>Law Enforcement Solution</strong>
            <small>Solution Overview</small>
          </button>
          <button class="tab" type="button" data-target="lightbar">
            <strong>Smart Lightbar System</strong>
            <small>Police Vehicle Solution</small>
          </button>
          <button class="tab" type="button" data-target="motorcycle">
            <strong>Motorcycle Enforcement Solution</strong>
            <small>Police Motorcycle Solution</small>
          </button>
          <button class="tab" type="button" data-target="alpr">
            <strong>Automatic License Plate Recognition</strong>
            <small>ALPR Solution</small>
          </button>
        </div>

        <h2 class="section-title">Products</h2>
        <div class="tab-list">
          <button class="tab" type="button" data-target="bodycam-premium">
            <strong>Body-Worn Camera (Premium Version)</strong>
          </button>
          <button class="tab" type="button" data-target="bodycam-long">
            <strong>Body-Worn Camera<br>(Long-Endurance Version)</strong>
          </button>
          <button class="tab" type="button" data-target="ptz">
            <strong>Intelligent PTZ Camera</strong>
          </button>
          <button class="tab" type="button" data-target="earbuds">
            <strong>Smart Recording Earbuds</strong>
          </button>
        </div>
      </nav>

      <div class="footer">
        Streamax Technology<br>
        © 2026 All rights reserved
      </div>
    </aside>

    <main class="viewer">
      <section class="panel active" id="law" aria-label="Law Enforcement Solution">
        <div class="spread-stack">
          <picture class="pdf-picture">
            <source media="(max-width: 780px)" srcset="assets/mobile/law-spread-2-3.jpg">
            <img class="pdf-page" src="assets/pages/law-spread-2-3.png" alt="">
          </picture>
          <picture class="pdf-picture">
            <source media="(max-width: 780px)" srcset="assets/mobile/law-spread-4-5.jpg">
            <img class="pdf-page" src="assets/pages/law-spread-4-5.png" alt="">
          </picture>
          <picture class="pdf-picture">
            <source media="(max-width: 780px)" srcset="assets/mobile/law-spread-6-7.jpg">
            <img class="pdf-page" src="assets/pages/law-spread-6-7.png" alt="">
          </picture>
        </div>
      </section>

      <section class="panel" id="lightbar" aria-label="Smart Lightbar System">
        <div class="page-stack edge-mask-left">
          <picture class="pdf-picture">
            <source media="(max-width: 780px)" srcset="assets/mobile/lightbar-moto-p1.jpg">
            <img class="pdf-page" src="assets/pages/lightbar-moto-p1.png" alt="">
          </picture>
        </div>
      </section>

      <section class="panel" id="motorcycle" aria-label="Motorcycle Enforcement Solution">
        <div class="page-stack">
          <picture class="pdf-picture">
            <source media="(max-width: 780px)" srcset="assets/mobile/lightbar-moto-p2.jpg">
            <img class="pdf-page" src="assets/pages/lightbar-moto-p2.png" alt="">
          </picture>
        </div>
      </section>

      <section class="panel" id="alpr" aria-label="Automatic License Plate Recognition">
        <div class="page-stack">
          <picture class="pdf-picture">
            <source media="(max-width: 780px)" srcset="assets/mobile/alpr-p1.jpg">
            <img class="pdf-page" src="assets/pages/alpr-p1.png" alt="">
          </picture>
          <span class="page-frame edge-mask-left">
            <picture class="pdf-picture">
              <source media="(max-width: 780px)" srcset="assets/mobile/alpr-p2.jpg">
              <img class="pdf-page" src="assets/pages/alpr-p2.png" alt="">
            </picture>
          </span>
        </div>
      </section>

      <section class="panel" id="bodycam-premium" aria-label="Body-Worn Camera Premium Version">
        <div class="page-stack edge-mask">
          <picture class="pdf-picture">
            <source media="(max-width: 780px)" srcset="assets/mobile/bodycam-p1.jpg">
            <img class="pdf-page" src="assets/pages/bodycam-p1.png" alt="">
          </picture>
        </div>
      </section>

      <section class="panel" id="bodycam-long" aria-label="Body-Worn Camera Long-Endurance Version">
        <div class="page-stack edge-mask">
          <picture class="pdf-picture">
            <source media="(max-width: 780px)" srcset="assets/mobile/bodycam-p2.jpg">
            <img class="pdf-page" src="assets/pages/bodycam-p2.png" alt="">
          </picture>
        </div>
      </section>

      <section class="panel" id="ptz" aria-label="Intelligent PTZ Camera">
        <div class="page-stack">
          <picture class="pdf-picture">
            <source media="(max-width: 780px)" srcset="assets/mobile/ptz-earbuds-p1.jpg">
            <img class="pdf-page" src="assets/pages/ptz-earbuds-p1.png" alt="">
          </picture>
        </div>
      </section>

      <section class="panel" id="earbuds" aria-label="Smart Recording Earbuds">
        <div class="page-stack edge-mask">
          <picture class="pdf-picture">
            <source media="(max-width: 780px)" srcset="assets/mobile/ptz-earbuds-p2.jpg">
            <img class="pdf-page" src="assets/pages/ptz-earbuds-p2.png" alt="">
          </picture>
        </div>
      </section>
    </main>
  </div>

  <script>
    const tabs = Array.from(document.querySelectorAll('.tab'));
    const panels = Array.from(document.querySelectorAll('.panel'));
    const viewer = document.querySelector('.viewer');

    function activate(targetId) {
      tabs.forEach((tab) => {
        tab.classList.toggle('active', tab.dataset.target === targetId);
      });

      panels.forEach((panel) => {
        panel.classList.toggle('active', panel.id === targetId);
      });

      viewer.scrollTop = 0;
      viewer.scrollLeft = 0;
    }

    tabs.forEach((tab) => {
      tab.addEventListener('click', () => activate(tab.dataset.target));
    });

    if (location.hash) {
      const targetId = location.hash.slice(1);
      if (document.getElementById(targetId)) {
        activate(targetId);
      }
    }
  </script>
</body>
</html>
